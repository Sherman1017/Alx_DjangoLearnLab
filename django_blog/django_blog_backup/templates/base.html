<!DOCTYPE html>
<html>
<head>
    <title>Django Blog</title>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/search/">Search</a>
        <a href="/post/new/">New Post</a>
        {% if user.is_authenticated %}
            <a href="/logout/">Logout</a>
        {% else %}
            <a href="/login/">Login</a>
        {% endif %}
    </nav>
    {% block content %}{% endblock %}
</body>
</html>
